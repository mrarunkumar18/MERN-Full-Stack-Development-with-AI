<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>manu</title>
    <style>
        nav{
            background-color: grey;
        }
        nav ul{
            list-style: none;
            margin: 0px;
            padding: 0px;

        }
        nav ul li{
            display: inline-block;
            margin: 0px;
            padding: 0px; 
        }
        nav ul li a{
            text-decoration: none;
            color: #fff;
            padding: 10px;
            display: block;
            border: 1px solid #fff;
        }
        nav ul li a:hover{
            background-color: #fff;
            color: grey;
        }
        
    </style>
</head>
<body>
    <h2>css list</h2>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Services</a></li>
        </ul>
    </nav>
    
</body>
</html>

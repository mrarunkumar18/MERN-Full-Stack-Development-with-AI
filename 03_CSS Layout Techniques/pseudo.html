<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Example</title>
    <style>
        a:hover{
            color: red;
            background-color: pink;
            text-decoration: none;
            font-size: 20px;
        }
        a:link{
            color: green;
        }
        a:visited{
            color: blue;
        }
        a:active{
            color: yellow;
        }
        ol li:first-child{
            color: red;
        }
        ol li:last-child{
            color: green;
        }
        ol li:nth-child(2){
            color: blue;
        }
    </style>
</head>
<body>
    <a href="https://www.google.com">Google</a>

<hr/>
<hr/>
     <ol>
        <li>A</li>
        <li>B</li>
        <li>C</li>
        
    </ol>
   
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Example</title>
</head>

<body>
    <!-- lIST: COLLECTION  of items (ordered <o></o> 123, a b c, i ii iii) or unordered (bullets - * +   - ) -->

    <h2>Ordered List</h2>
    <ol type="i" start="5">
        <li>First item
            <ul>
                <li>aa</li>
                <li>bb</li>
                <li>cc
                </li>
            </ul>
        </li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>

    <h2>Unordered List</h2>
    <ul type="circle">
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>

</body>

</html>

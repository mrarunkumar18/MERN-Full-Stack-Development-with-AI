<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h2>Table Example</h2>
    <table border="1">
        <tr>
            <th rowspan="3">Html</th>
            <th colspan="3">Personal Information</th>
        </tr>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        </tr>
        <tr>
            <td>Arun</td>
            <td>22</td>
            <td>Surat</td>
        </tr>

    </table>
</body>
</html>

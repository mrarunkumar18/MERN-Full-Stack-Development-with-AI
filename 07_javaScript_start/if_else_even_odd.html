<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
</head>

<body>
    <h2>if else statement</h2>
    <script>
        let num1 = parseInt(prompt("Enter a number:"));
        if (num1 % 2 === 0) {
            alert("Even Number");

        }
        else {
            alert("Odd Number");
        }
        
    </script>
</body>

</html>

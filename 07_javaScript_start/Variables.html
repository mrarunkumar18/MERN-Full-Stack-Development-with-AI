<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <h2>Variables</h2>
    <script>
        let name = "Arun";
        const age = 30;
        var city = "Chennai";
        console.log(name);
        console.log(age);
        console.log(city);
        name = "Arun Kumar";
        console.log(name);
        // age = 31; // This will throw an error because age is a constant
        console.log(age);
        city = "Bangalore"; // This will work because city is declared with var
        console.log(city);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Loop example</title>
</head>
<body>
    <h2>For Loop Example</h2>
    <script>
        //input a number and find its factorial

        let num=parseInt(prompt("Enter Number"))
        let fact =1;
        for(let i=num; i>=1; i--){
            fact=fact*i
        }
        alert(`the factorial of ${num} is ${fact}`)
    </script>
</body>
</html>

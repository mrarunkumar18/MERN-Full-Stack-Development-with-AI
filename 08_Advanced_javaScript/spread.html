<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Oprator</title>
</head>
<body>
    <h2>Spread  Operator Example</h2>
    
    <script>
        //array
        let arr=[2,3,4,5,6]
        let newArr=[...arr,89,90]
        console.log(newArr);
        //object
let obj = {name:"Arun", age:21}
let newObj = {...obj,age:22,city:"Mumbai"};
console.log(newObj);

    </script>
</body>
</html>

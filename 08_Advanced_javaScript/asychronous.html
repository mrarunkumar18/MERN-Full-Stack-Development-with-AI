<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynchronous JavaScript </title>
</head>
<body>
    <h2>Asynchronous JavaScript</h2>
    <script>
        console.log("Start");
        setTimeout(() => {
            console.log("This is an asynchronous message");
        }, 2000);
        console.log("End");
    </script>
</body>
</html>

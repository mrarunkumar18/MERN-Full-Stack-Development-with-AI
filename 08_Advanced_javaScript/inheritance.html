    <script>
    // Parent Class - Changed 'person' to 'Person'
    class Person {
        constructor(fname, lname, age) {
            this.fname = fname;
            this.lname = lname;
            this.age = age;
        }
        getFullName() {
            return `${this.fname} ${this.lname}`;
        }
    }

    // Child Class - Fixed 'Enployee' to 'Employee' and extended 'Person'
    class Employee extends Person {
        constructor(fname, lname, age, job) {
            super(fname, lname, age);
            this.job = job;
        }
        getFullDetails() {
            return `Name: ${this.getFullName()}, Age: ${this.age}, Job: ${this.job}`;
        }
    }

    // Correctly instantiating 'Employee' with all required arguments
    const employee1 = new Employee("John", "Doe", 30, "Developer");
    console.log(employee1.getFullDetails()); 
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>call , apply , Bind</title>
</head>
<body>
    <h2>Call Apply Bind</h2>
    <script>
        function xyz(message,data){
            console.log(`${message}, ${this.name} , ${data}`);
        }
            const person = {name :"Arun"}   
            xyz.call(person,"Hello", "!")
    </script>
</body>
</html>

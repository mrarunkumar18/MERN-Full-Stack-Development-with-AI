<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shollow Copy</title>
</head>
<body>
    <h2>Shallow Copy</h2>
    <script>
        let person={
            id:101,
            name:"abc",
            city:"Surat"
        }
        console.log(person)
        //Shallow copy
let newPerson = {...person}
console.log(newPerson)

    </script>
</body>

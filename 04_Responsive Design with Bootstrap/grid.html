<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid</title>
    <style>
        main{
            display: grid;
            grid-template-areas: 
            'header header header'
            'nav nav nav'
            'aside article article'
            'footer footer footer';
        }
    </style>
  </head>

  <body>
    <main>
      <header>
        <h2>My Header</h2>
      </header>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Services</a></li>
        </ul>
      </nav>
      <section>
        <aside>
          <h2>My Sidebar</h2>
        </aside>
        <article>
          <h2>My Article</h2>
        </article>
      </section>
      <footer>
        <h2>My Footer</h2>
      </footer>
    </main>
  </body>
</html>
